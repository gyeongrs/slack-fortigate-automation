# Desired-state firewall policies.
# The engine matches existing policies by "name", so names must be unique
# and stable. Requests coming from Slack append entries here via a PR.
policies:
  - name: allow-corp-to-web
    srcintf: [lan]
    dstintf: [dmz]
    srcaddr: [corp-clients]
    dstaddr: [app-web-server]
    service: [HTTPS, app-https-8443]
    action: accept
    schedule: always
    logtraffic: all
    status: enable
    comment: "Corp clients to web app (ticket: NETOPS-1001)"
