# Safety guardrails enforced by the validator before any plan/apply.
# These rules are intentionally conservative; tighten them for your environment.

# Reject a firewall policy that opens "any" on these fields.
forbid_any:
  srcaddr: true      # source address must not be "all"/"any"
  dstaddr: true      # destination address must not be "all"/"any"
  service: true      # service must not be "ALL"/"any"

# Service ports that are never allowed to be opened via automation.
# (telnet, SMB, RDP-to-the-world, etc. — adjust to your policy)
forbidden_ports:
  - 23       # telnet
  - 135      # msrpc
  - 137      # netbios
  - 139      # netbios
  - 445      # smb
  - 3389     # rdp (require manual review)

# Only these interfaces may be used as src/dst in automated policies.
allowed_interfaces:
  - port1
  - port2
  - lan
  - wan1
  - dmz
  - core-trust
  - core-untrust
  - inet-trust
  - inet-untrust
  - mgmt-trust
  - mgmt-untrust
  - mgt-trust
  - mgt-untrust
  - exco-trust
  - exco-untrust
  - ch-trust
  - ch-untrust
  - svr-trust
  - svr-untrust
  - vdi-trust
  - vdi-untrust
  - dmz-trust
  - dmz-untrust
  - cc-trust
  - cc-untrust

# Built-in FortiGate services that may be referenced in a policy without
# being defined in services.yaml. Anything else must be a custom service
# defined in services.yaml (referential-integrity check), otherwise the
# apply would fail on the device.
allowed_builtin_services:
  - ALL_ICMP
  - PING
  - DNS
  - HTTP
  - HTTPS
  - SSH
  - NTP
  - SMTP
  - SMTPS
  - IMAP
  - IMAPS
  - POP3
  - POP3S
  - LDAP
  - SYSLOG
  - SNMP

# Every automated policy must set these.
require:
  logtraffic: all
  schedule: always

# Temporary policies: expires_at in firewall_policies.yaml (YYYY-MM-DD).
# Slack /fw-request defaults to default_valid_days; a one-time FortiGate
# schedule is created on apply. Daily CI posts Slack alerts before expiry.
expiry:
  default_valid_days: 90
  alert_days_before: [14, 7, 1]   # notify when this many days remain
  max_valid_days: 365             # reject longer temporary policies

# Refuse to manage more than this many policy changes in a single apply
# (a tripwire against accidental mass changes).
max_changes_per_apply: 10

# Policy prefix = center_code + zone_code (any short string — not limited to A/B/C)
#   dc1-core-fw  →  D1 + CR  →  D1CR10.50.1.1>D1CR10.51.10.1
policy_naming:
  center_map:        # datacenter / site (1st segment) — 편한 코드로 자유롭게
    dc1: D1
    dc2: D2
  zone_map:          # security zone (2nd segment)
    core: CR
    inet: IN
    mgt: MG
    mgmt: MG
    exco: EX
    ch: CH
    svr: SV
    vdi: VD
    dmz: DZ
    cc: CC
  default_center_code: "00"   # legacy {zone}-fw only (e.g. ch-fw → 00CH)
