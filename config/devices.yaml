# Firewall inventory used for route-aware target selection.
#
# In dry-run mode (FORTIGATE_DRY_RUN=true) the "routes" block below is used as a
# mock routing table (FIB) so the selection logic can be tested without any
# hardware. With a live device the routes would instead come from
#   GET /api/v2/monitor/router/lookup?destination=<ip>
#
# A device is chosen as the policy target when the requested traffic *transits*
# it: the source resolves to one interface and the destination to a different
# interface. Every transit firewall on the path gets its own allow policy.

devices:
  - name: core-fw
    host: 10.0.0.1
    vdom: root
    token_env: FORTIGATE_API_TOKEN_CORE
    routes:
      - {dst: 10.55.10.0/24, interface: core-trust, type: static}
      - {dst: 10.55.20.0/24, interface: core-trust, type: static}
      - {dst: 10.55.30.0/24, interface: core-trust, type: static}
      - {dst: 10.55.40.0/24, interface: core-trust, type: static}
      - {dst: 10.55.50.0/24, interface: core-trust, type: static}
      - {dst: 10.55.60.0/24, interface: core-trust, type: static}
      - {dst: 10.52.10.0/24, interface: core-trust, type: static}
      - {dst: 10.52.20.0/24, interface: core-trust, type: static}
      - {dst: 10.52.30.0/24, interface: core-trust, type: static}
      - {dst: 10.52.40.0/24, interface: core-trust, type: static}
      - {dst: 10.52.50.0/24, interface: core-trust, type: static}
      - {dst: 10.52.60.0/24, interface: core-trust, type: static}
      - {dst: 10.54.10.0/24, interface: core-untrust, type: static}
      - {dst: 10.54.20.0/24, interface: core-untrust, type: static}
      - {dst: 10.54.30.0/24, interface: core-untrust, type: static}
      - {dst: 10.54.40.0/24, interface: core-untrust, type: static}
      - {dst: 10.54.50.0/24, interface: core-untrust, type: static}
      - {dst: 10.54.60.0/24, interface: core-untrust, type: static}
      - {dst: 10.53.10.0/24, interface: core-untrust, type: static}
      - {dst: 10.53.20.0/24, interface: core-untrust, type: static}
      - {dst: 10.53.30.0/24, interface: core-untrust, type: static}
      - {dst: 10.53.40.0/24, interface: core-untrust, type: static}
      - {dst: 10.53.50.0/24, interface: core-untrust, type: static}
      - {dst: 10.53.60.0/24, interface: core-untrust, type: static}

  - name: inet-fw
    host: 10.0.0.2
    vdom: root
    token_env: FORTIGATE_API_TOKEN_INET
    routes:
      - {dst: 10.52.0.0/16, interface: inet-trust, type: static}
      - {dst: 10.53.0.0/16, interface: inet-trust, type: static}
      - {dst: 10.55.0.0/16, interface: inet-trust, type: static}
      - {dst: 10.54.10.0/24, interface: inet-untrust, type: static}
      - {dst: 10.54.20.0/24, interface: inet-untrust, type: static}
      - {dst: 10.54.30.0/24, interface: inet-untrust, type: static}
      - {dst: 10.54.40.0/24, interface: inet-untrust, type: static}
      - {dst: 10.54.50.0/24, interface: inet-untrust, type: static}
      - {dst: 10.54.60.0/24, interface: inet-untrust, type: static}

  - name: mgt-fw
    host: 10.0.0.3
    vdom: root
    token_env: FORTIGATE_API_TOKEN_MGT
    routes:
      - {dst: 10.54.0.0/16, interface: mgt-untrust, type: static}
      - {dst: 10.53.0.0/16, interface: mgt-untrust, type: static}
      - {dst: 10.55.0.0/16, interface: mgt-untrust, type: static}
      - {dst: 10.52.10.0/24, interface: mgt-trust, type: static}
      - {dst: 10.52.20.0/24, interface: mgt-trust, type: static}
      - {dst: 10.52.30.0/24, interface: mgt-trust, type: static}
      - {dst: 10.52.40.0/24, interface: mgt-trust, type: static}
      - {dst: 10.52.50.0/24, interface: mgt-trust, type: static}
      - {dst: 10.52.60.0/24, interface: mgt-trust, type: static}

  - name: exco-fw
    host: 10.0.0.4
    vdom: root
    token_env: FORTIGATE_API_TOKEN_EXCO
    routes:
      - {dst: 10.52.0.0/16, interface: exco-trust, type: static}
      - {dst: 10.54.0.0/16, interface: exco-trust, type: static}
      - {dst: 10.55.0.0/16, interface: exco-trust, type: static}
      - {dst: 10.53.10.0/24, interface: exco-untrust, type: static}
      - {dst: 10.53.20.0/24, interface: exco-untrust, type: static}
      - {dst: 10.53.30.0/24, interface: exco-untrust, type: static}
