# Firewall inventory used for route-aware target selection.
#
# Offline (FORTIGATE_DRY_RUN=true): the "routes" block is the mock FIB.
# Online: route selection calls GET /api/v2/monitor/router/lookup?destination=<ip>
# on each inventory device (falls back to "routes" if the API is unreachable).
#
# Refresh the reference table from live devices:
#   fwctl routes sync
# Probe one destination across all firewalls:
#   fwctl routes probe 10.52.10.1
#
# Device name pattern: {center}-{zone}-fw  (e.g. dc1-core-fw)
# Policy prefix = center letter + zone letter (see policy_naming in policy_rules.yaml)
#
# A device is chosen as the policy target when traffic *transits* it (src and
# dst resolve to different interfaces). Every transit firewall gets a policy.

route_probes:
  - 10.52.10.1   # AWS zone
  - 10.53.10.1   # partner / exco
  - 10.54.10.1   # external / inet
  - 10.55.10.1   # core local
  - 10.51.10.1   # ch zone
  - 10.56.10.1   # svr zone
  - 10.57.10.1   # vdi zone
  - 10.1.10.1    # dmz zone
  - 10.58.10.1   # cc zone
  - 10.99.5.10   # mgmt host
  - 172.16.8.20  # external partner

devices:
  - name: dc1-core-fw
    host: 10.0.0.1
    vdom: root
    token_env: FORTIGATE_API_TOKEN_CORE
    routes:
