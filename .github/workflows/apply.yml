name: apply

# Applies the desired state after a PR is merged to main.
# Uses a protected "production" environment so a reviewer can gate the apply.
on:
  push:
    branches: [main]
    paths:
      - "policies/**"
      - "config/**"

concurrency:
  group: fortigate-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[bot]"

      - name: Apply to FortiGate
        id: apply
        env:
          # Set repo variable FORTIGATE_DRY_RUN=true to test without a device.
          FORTIGATE_DRY_RUN: ${{ vars.FORTIGATE_DRY_RUN }}
          FORTIGATE_HOST: ${{ secrets.FORTIGATE_HOST }}
          FORTIGATE_API_TOKEN: ${{ secrets.FORTIGATE_API_TOKEN }}
          FORTIGATE_VERIFY_TLS: ${{ secrets.FORTIGATE_VERIFY_TLS }}
        run: |
          set -o pipefail
          fwctl apply --yes 2>&1 | tee apply.log

      - name: Notify Slack (apply result)
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_NOTIFY_CHANNEL: ${{ vars.SLACK_NOTIFY_CHANNEL }}
        run: |
          STATUS=success
          if [ "${{ steps.apply.outcome }}" != "success" ]; then STATUS=failure; fi
          python -m slack_bot.notify_apply --log apply.log --status "$STATUS"
